# =============================================================================
# ExternalSecret — iris-secrets (app + infra)
#
# Projects the GSM entries into two identical `iris-secrets` Kubernetes
# Secrets (one per consumer namespace). `refreshInterval: 1h` picks up password
# rotations within the hour; forced refresh is available via
#   kubectl annotate externalsecret iris-secrets -n app \
#     force-sync=$(date +%s) --overwrite
#
# OTEL_EXPORTER_OTLP_AUTH is NOT projected here: the demo runs with
# MANAGEMENT_OTLP_*_EXPORT_ENABLED=false (no collector), so no auth
# header is needed. When/if Grafana Cloud is wired in, add a GSM
# entry + a data: row here.
# =============================================================================
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: iris-secrets
  namespace: app
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: gcp-secret-manager
    kind: SecretStore
  target:
    name: iris-secrets
    creationPolicy: Owner
  data:
    - secretKey: DB_PASSWORD
      remoteRef:
        key: iris-db-password
    - secretKey: JWT_SECRET
      remoteRef:
        key: iris-jwt-secret
    - secretKey: API_KEY
      remoteRef:
        key: iris-api-key
    - secretKey: GITLAB_API_TOKEN
      remoteRef:
        key: iris-gitlab-api-token
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: iris-secrets
  namespace: infra
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: gcp-secret-manager
    kind: SecretStore
  target:
    name: iris-secrets
    creationPolicy: Owner
  data:
    - secretKey: DB_PASSWORD
      remoteRef:
        key: iris-db-password
    - secretKey: JWT_SECRET
      remoteRef:
        key: iris-jwt-secret
    - secretKey: API_KEY
      remoteRef:
        key: iris-api-key
    - secretKey: GITLAB_API_TOKEN
      remoteRef:
        key: iris-gitlab-api-token
